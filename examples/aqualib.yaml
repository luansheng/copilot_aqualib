# Directory layout
directories:
  base: ./aqualib_workspace
  work: work
  results: results
  data: data
  skills_vendor: skills/vendor             # Mount point for external vendor skill libraries
  vendor_traces: results/vendor_traces     # Vendor invocation trace logs

# LLM configuration (OpenAI-compatible)
llm:
  # api_key: ""           # or set OPENAI_API_KEY env var
  # base_url: null        # set for custom / self-hosted endpoints
  model: gpt-4o
  temperature: 0.2
  max_tokens: 4096

# RAG pipeline
rag:
  chunk_size: 512
  chunk_overlap: 64
  similarity_top_k: 5
  embed_model: text-embedding-3-small

# Always prefer vendor skills over generic alternatives
vendor_priority: true

verbose: false
